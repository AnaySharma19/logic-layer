# ─────────────────────────────────────────────────────────────
# Logic Layer — CI workflow
# Runs lint + tests on every push and pull request to `develop`
# and `main`. Mirrors the standards documented in CONTRIBUTING.md.
# ─────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancel in-flight runs for the same branch on new pushes — save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ───────────────────────────────────────────────────────────
  # 1. Middleware / Python: lint, type-check, test
  # ───────────────────────────────────────────────────────────
  middleware:
    name: Middleware (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: middleware
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: logic_layer_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: logic_layer_test
      DATABASE_USER: test
      DATABASE_PASSWORD: test
      ENVIRONMENT: test
      LOG_LEVEL: WARNING
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: middleware/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      - name: Ruff (lint + format check)
        run: ruff check . && ruff format --check .

      - name: mypy (type check)
        run: mypy .

      - name: Pytest (with coverage)
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: middleware-coverage
          path: middleware/coverage.xml

  # ───────────────────────────────────────────────────────────
  # 2. UI client: lint, type-check, build, test
  # ───────────────────────────────────────────────────────────
  ui-client:
    name: UI Client (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test -- --coverage

      - name: Build
        run: npm run build

  # ───────────────────────────────────────────────────────────
  # 3. Secrets / dependency hygiene
  # ───────────────────────────────────────────────────────────
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Python dependency audit (pip-audit)
        working-directory: middleware
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Node dependency audit
        working-directory: ui-client
        run: npm audit --audit-level=high

  # ───────────────────────────────────────────────────────────
  # 4. Lint the hygiene files themselves
  # ───────────────────────────────────────────────────────────
  docs:
    name: Docs / Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !node_modules/**